<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Petition | Large Partition</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="main-container">
        <div class="card">
            <header>
                <span class="live-indicator">● LIVE PETITION</span>
                <h1>Demand a Separate, Very Large Partition</h1>
                <p>XL 3 +. Sign to make it happen.</p>
                
                <div class="counter-box">
                    <span id="total-count">0</span>
                    <label>Signatures Collected</label>
                </div>
            </header>

            <div id="interaction-zone">
                <form id="petition-form">
                    <input type="text" id="user-name" placeholder="Your Full Name" required>
                    <textarea id="user-comment" placeholder="Why do you support this? (Optional)" rows="3"></textarea>
                    <button type="submit" id="submit-btn">Add My Signature</button>
                </form>

                <div id="success-area" class="hidden">
                    <div class="icon">✅</div>
                    <h3>Signature Verified</h3>
                    <p>You've successfully joined the movement.</p>
                </div>
            </div>

            <section class="feed">
                <h2>Recent Signatures</h2>
                <div id="signature-list">
                    <div class="loading">Connecting to database...</div>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
